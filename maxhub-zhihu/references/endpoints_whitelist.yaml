# ===== 调用前验证协议 =====
# 每次调用 API 前，Agent 必须静默验证：
# 1. 请求路径是否逐字符等于 endpoints[].path 中的某一项？否 → STOP
# 2. HTTP method 是否匹配？否 → STOP
# 3. 所有 required 参数是否已提供？否 → STOP
# 4. 若 risk: high 或 requires_user_confirmation: true，是否已获用户确认？否 → STOP
