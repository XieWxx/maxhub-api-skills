# 路径合法性硬白名单
# Agent 在调用 API 前必须逐字符核对本文件，不在清单中的路径禁止调用。
# 禁止臆造路径、修改版本段、拼接新路径。

skill: maxhub-zhihu
version: "3.7.2"
base_url: https://www.aconfig.cn

endpoints:
  # ========== Posts / Content (post.md) ==========
  - id: fetch_column_articles
    method: GET
    path: /api/v1/zhihu/web/fetch_column_articles
    risk: low
    required: [column_id]
    optional: [limit, offset]

  - id: fetch_column_article_detail
    method: GET
    path: /api/v1/zhihu/web/fetch_column_article_detail
    risk: low
    required: [article_id]
    optional: []

  - id: fetch_column_recommend
    method: GET
    path: /api/v1/zhihu/web/fetch_column_recommend
    risk: low
    required: [article_id]
    optional: [limit, offset]

  - id: fetch_column_relationship
    method: GET
    path: /api/v1/zhihu/web/fetch_column_relationship
    risk: low
    required: [article_id]
    optional: []

  - id: fetch_column_comment_config
    method: GET
    path: /api/v1/zhihu/web/fetch_column_comment_config
    risk: low
    required: [article_id]
    optional: []

  - id: fetch_comment_v5
    method: GET
    path: /api/v1/zhihu/web/fetch_comment_v5
    risk: low
    required: [answer_id]
    optional: [order_by, limit, offset]

  - id: fetch_sub_comment_v5
    method: GET
    path: /api/v1/zhihu/web/fetch_sub_comment_v5
    risk: low
