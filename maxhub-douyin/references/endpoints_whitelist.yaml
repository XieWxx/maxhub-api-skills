# ===== Pre-call verification protocol =====
# Before EVERY API call, the assistant MUST silently verify:
# 1. Does the exact path string equal one of `endpoints[].path`? If NO → STOP.
# 2. Does the HTTP method match the matching entry's `method`? If NO → STOP.
# 3. Are all `required` params present? If NO → STOP, ask user / reread reference.
# 4. If `risk: high` or `requires_user_confirmation: true`, has user explicitly
#    confirmed all params? If NO → STOP, ask user to confirm.
# Only proceed when ALL 4 checks pass.
