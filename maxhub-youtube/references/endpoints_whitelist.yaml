# Hard whitelist for path validation.
# Agent MUST verify the requested path against this file BYTE-BY-BYTE before calling.
# Any path NOT listed here is INVALID — STOP and report "Unknown API path".
# Do NOT mutate version segments, append paths, or invent new endpoints from patterns.

skill: maxhub-youtube
version: "3.7.2"
base_url: https://www.aconfig.cn

endpoints:
  # ========== Video - Web (video.md) ==========
  - id: web_get_video_info
    method: GET
    path: /api/v1/youtube/web/get_video_info
    risk: low
    required: [video_id]
    optional: [url_access, lang, videos, audios, subtitles, related]

  - id: web_get_video_info_v2
    method: GET
    path: /api/v1/youtube/web/get_video_info_v2
    risk: low
    required: [video_id]
    optional: []

  - id: web_get_video_subtitles
    method: GET
    path: /api/v1/youtube/web/get_video_subtitles
    risk: low
    required: [subtitle_url]
    optional: [format, fix_overlap, target_lang]

  - id: web_get_relate_video
    method: GET
    path: /api/v1/youtube/web/get_relate_video
    risk: low
    required: [video_id]
    optional: [continuation_token]

  - id: web_get_trending_videos
    method: GET
    path: /api/v1/youtube/web/get_trending_videos
    risk: low
    required: []
    optional: [language_code, country_code, section]

